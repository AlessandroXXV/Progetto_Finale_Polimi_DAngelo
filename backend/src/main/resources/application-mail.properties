# Email Configuration
spring.mail.host=${SMTP_HOST:mail.eably.it}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:noreply@eably.it}
spring.mail.password=${SMTP_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Template Configuration
app.email.logo-path=${APP_EMAIL_LOGO_PATH:classpath:/static/images/logo.png}
app.email.retry-interval-ms=${APP_EMAIL_RETRY_INTERVAL_MS:300000}

# Email Content Configuration
eably.verification.documents.recipient-email=${VERIFICATION_DOCS_EMAIL:verification@eably.it}

# Booking Timeout Configuration
eably.booking.payment-timeout-scheduler-enabled=true
eably.booking.payment-timeout-minutes=10
eably.booking.payment-timeout-check-interval-ms=30000

