# Test Configuration for Eably Backend
# Uses PostgreSQL local database for testing (required for pessimistic locking)
# IMPORTANT: Uses a SEPARATE test database to avoid data loss on main database

# PostgreSQL Database Configuration
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/eably_test}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:ale}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# Disable JMX for tests
spring.jmx.enabled=false

# Logging
logging.level.it.eably.backend=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Mail (disabled for tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# JWT Configuration
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-required
jwt.expiration=3600000

# Booking payment timeout scheduler
eably.booking.payment-timeout-scheduler-enabled=false

